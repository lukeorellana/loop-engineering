# Reference consumer workflow: PR failure with pull-request-mode: new.
#
# Copy into a repository as `.github/workflows/ci-triage.yml`. When the source
# `CI` workflow fails on a pull-request-triggered run, CI Triage opens a NEW
# STACKED remediation pull request on the original PR's head branch instead of
# updating the existing PR in place.
#
# The new PR is created asynchronously by the Agent Tasks API, so the action
# cannot output the future PR number; find it from the task URL.
name: CI Triage (stacked)

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

concurrency:
  group: ci-triage-${{ github.repository }}-${{ github.event.workflow_run.id }}-${{ github.event.workflow_run.run_attempt }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  triage:
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure'
          && github.event.workflow_run.event == 'pull_request' }}
    steps:
      - name: Triage and open a stacked remediation PR
        uses: lukeorellana/loop-engineering/actions/ci-triage@v1
        with:
          github-token: ${{ github.token }}
          agent-token: ${{ secrets.CI_TRIAGE_AGENT_TOKEN }}
          # new: always open a new PR. For a PR-triggered failure this is a
          # stacked remediation PR on the original PR's head branch.
          pull-request-mode: new
