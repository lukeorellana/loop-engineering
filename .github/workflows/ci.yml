name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build and validate (${{ matrix.action }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        action: [feature-loop, ci-triage]
    defaults:
      run:
        working-directory: actions/${{ matrix.action }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: actions/${{ matrix.action }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build bundle
        run: npm run build

      - name: Verify committed bundle is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' in actions/${{ matrix.action }} and commit the result."
            git --no-pager diff -- dist
            exit 1
          fi

  smoke-test:
    name: Local action smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Feature Loop action
        uses: ./actions/feature-loop

      # CI Triage requires an agent-token and is run in dry-run mode so the
      # smoke test exercises the packaged action without any Agent Tasks writes.
      - name: Run CI Triage action (dry run)
        uses: ./actions/ci-triage
        with:
          github-token: ${{ github.token }}
          agent-token: ${{ github.token }}
          dry-run: 'true'

  scripts:
    name: Repository scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test assign-copilot-agent script
        run: node --test .github/scripts/assign-copilot-agent.test.js

