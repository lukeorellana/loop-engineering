name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: actions/feature-loop

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: actions/feature-loop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Build bundle
        run: npm run build

      - name: Verify committed bundle is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' in actions/feature-loop and commit the result."
            git --no-pager diff -- dist
            exit 1
          fi

  smoke-test:
    name: Local action smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Feature Loop action
        uses: ./actions/feature-loop
