name: Rebuild Feature Loop dist

on:
  push:
    branches:
      - fix/markdown-parent-epic-resolution

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/markdown-parent-epic-resolution

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: actions/feature-loop/package-lock.json

      - name: Build action bundle
        working-directory: actions/feature-loop
        run: |
          npm ci
          npm run build

      - name: Commit generated bundle
        run: |
          if git diff --quiet -- actions/feature-loop/dist; then
            echo "Bundle is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add actions/feature-loop/dist
          git commit -m "build(feature-loop): refresh action bundle"
          git push origin HEAD:fix/markdown-parent-epic-resolution
